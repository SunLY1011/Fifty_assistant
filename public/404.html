<!DOCTYPE html>
<html lang="zh-Hans-CN">
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages 404.html 回退方案
    // 将路径中的 /gojuuon_helper_vue 前缀正确处理
    var path = window.location.pathname;
    var segment = path.replace(/^\/gojuuon_helper_vue\/404\.html/, '');
    // 将路径参数附加到 index.html 进行重定向
    window.location.replace(
      '/gojuuon_helper_vue/' +
      (segment ? '#' + segment : '')
    );
  </script>
</head>
<body></body>
</html>
