<!DOCTYPE html>
<html lang="zh-Hans-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线模式 - 五十音助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: #f0f2f5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    
    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .features {
      text-align: left;
      margin-bottom: 32px;
    }
    
    .feature {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    
    .feature:last-child {
      border-bottom: none;
    }
    
    .feature-icon {
      width: 40px;
      height: 40px;
      background: #e8f4f8;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      font-size: 20px;
    }
    
    .feature-text {
      flex: 1;
    }
    
    .feature-text h3 {
      color: #333;
      font-size: 16px;
      margin-bottom: 4px;
    }
    
    .feature-text p {
      color: #999;
      font-size: 13px;
      margin-bottom: 0;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.3s;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    
    .btn:hover {
      background: #5a6fd1;
    }
    
    .status {
      margin-top: 24px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    
    .status-text {
      color: #666;
      font-size: 14px;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📱</div>
    <h1>离线模式</h1>
    <p>当前无网络连接，但您已缓存的应用和数据仍可使用</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📖</div>
        <div class="feature-text">
          <h3>学习记录已保存</h3>
          <p>您的学习进度不会丢失</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔊</div>
        <div class="feature-text">
          <h3>音频已缓存</h3>
          <p>发音和背景音乐可正常使用</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <div class="feature-text">
          <h3>练习功能可用</h3>
          <p>可继续进行五十音练习</p>
        </div>
      </div>
    </div>
    
    <button class="btn" onclick="window.location.reload()">
      重试连接
    </button>
    
    <div class="status">
      <div class="status-dot"></div>
      <span class="status-text">应用已准备就绪</span>
    </div>
  </div>
</body>
</html>
